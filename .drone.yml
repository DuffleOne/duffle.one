---
kind: pipeline
type: docker
name: build and publish

steps:
  - name: build_site
    image: node:20
    environment:
      BUILD_DIR: /build
      CI: true
    volumes:
      - name: build
        path: /build
    commands:
      - npm ci
      - npm run build

  - name: publish production
    image: amazon/aws-cli
    volumes:
      - name: build
        path: /build
      - name: aws
        path: /root/.aws
    commands:
      # Sync the built site. Exclude the entry HTML (re-uploaded below with
      # no-cache headers) and the full-size jellycat jpgs: those live only in
      # S3 (gitignored, ~2GB, pushed from local via publish.sh), so without the
      # exclude the --delete would wipe all of them on every deploy.
      - aws s3 sync /build s3://duffle.one --acl public-read --follow-symlinks --delete --exclude "index.html" --exclude "jellycats.html" --exclude "img/jellycats/*.jpg"
      # Entry HTML: text/html, no caching, so each deploy invalidates straight
      # away. The hashed asset bundles can cache long; these two can't.
      - aws s3 cp /build/index.html s3://duffle.one/index.html --acl public-read --content-type text/html --cache-control "no-cache, no-store, must-revalidate" --metadata-directive REPLACE
      - aws s3 cp /build/jellycats.html s3://duffle.one/jellycats.html --acl public-read --content-type text/html --cache-control "no-cache, no-store, must-revalidate" --metadata-directive REPLACE
      # SPA fallback: any unknown path serves index.html so the hash router can
      # take over. Real files (jellycats.html, /img/*) still serve directly.
      - aws s3 website s3://duffle.one/ --index-document index.html --error-document index.html
    depends_on:
      - build_site
    when:
      branch:
        - master
      event:
        - push
        - promote

volumes:
  - name: build
    temp: {}
  - name: aws
    host:
      path: /root/.aws
