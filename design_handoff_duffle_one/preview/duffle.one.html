<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>tty.duffle.one — v2 visual</title>
<meta name="viewport" content="width=1400"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; background: #f0eee9; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tty-theme.jsx"></script>
<script type="text/babel" src="tty-chrome.jsx"></script>
<script type="text/babel" src="tty-screens-1.jsx"></script>
<script type="text/babel" src="tty-screens-2.jsx"></script>
<script type="text/babel" src="tty-screens-3.jsx"></script>

<script type="text/babel" data-presets="env,react">
const W = 760, H = 980;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="tty"
        title="tty.duffle.one · v2"
        subtitle="Visual iteration on the terminal direction. Phosphor-on-near-black, Space Grotesk display + JetBrains Mono body, saturated oklch accents (green primary, amber/pink/cyan/violet siblings). Static visuals only — every screen is a still composition."
      >
        <DCArtboard id="tty-home"     label="01 · home (with links)"  width={W} height={H}><TtyHome/></DCArtboard>
        <DCArtboard id="tty-projects" label="02 · projects + detail"  width={W} height={H}><TtyProjects/></DCArtboard>
        <DCArtboard id="tty-photo"    label="03 · contact sheet"      width={W} height={H}><TtyPhoto/></DCArtboard>
        <DCArtboard id="tty-gaming"   label="04 · servers"            width={W} height={H}><TtyGaming/></DCArtboard>
        <DCArtboard id="tty-guide"    label="05 · man laura(1)"       width={W} height={H}><TtyGuide/></DCArtboard>
        <DCArtboard id="tty-cv"       label="06 · cv"                 width={W} height={H}><TtyCV/></DCArtboard>
        <DCArtboard id="tty-palette"  label="07 · ⌘K palette"         width={W} height={H}><TtyPalette/></DCArtboard>
        <DCArtboard id="tty-404"      label="08 · sudo / easter egg"  width={W} height={H}><Tty404/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
