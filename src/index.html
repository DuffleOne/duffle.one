<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8"/>
		<meta name="viewport" content="width=device-width,initial-scale=1"/>
		<title>duffle.one — Laura Miller</title>
		<meta name="description" content="Laura Miller. Founding engineer, photographer, 3D-print enthusiast. duffle.one."/>
		<meta name="theme-color" content="#F2F2EF" media="(prefers-color-scheme: light)"/>
		<meta name="theme-color" content="#141312" media="(prefers-color-scheme: dark)"/>
		<link rel="icon" href="/favicon.png" type="image/png"/>
		<link rel="manifest" href="/site.webmanifest"/>
		<link rel="preload" href="/fonts/alcyone/Alcyone-Regular.woff2" as="font" type="font/woff2" crossorigin/>
		<link rel="preload" href="/fonts/alcyone/Alcyone-Medium.woff2" as="font" type="font/woff2" crossorigin/>
		<script>
			// Apply persisted theme before paint to avoid a flash.
			(function () {
				try {
					var v = localStorage.getItem("duffle:theme");
					if (v === "light" || v === "dark") {
						document.documentElement.setAttribute("data-theme", v);
					}
				} catch (e) { /* ignore */ }
			})();
		</script>
	</head>
	<body>
		<noscript>
			<div style="padding: 24px; font-family: 'Alcyone', system-ui, sans-serif;">
				duffle.one needs JavaScript to render. Try a modern browser, or email laura@duffle.one.
			</div>
		</noscript>
		<div id="app"></div>
		<script type="module" src="/main.ts"></script>
	</body>
</html>
