	<script type="module">
		// === Console Art ===
		console.log(
			'%c' +
			'    ____        __________   \n' +
			'   / __ \\__  __/ __/ __/ /__ \n' +
			'  / / / / / / / /_/ /_/ / _ \\\n' +
			' / /_/ / /_/ / __/ __/ /  __/\n' +
			'/_____/\\__,_/_/ /_/ /_/\\___/ \n',
			'color: #8b5cf6; font-weight: bold; font-size: 12px;'
		);
		console.log(
			'%cYou found the console!',
			'color: #f43f5e; font-size: 14px; font-weight: bold;'
		);
		console.log(
			'%cTry %cwindow.duffle.help()%c for toys.',
			'color: #64748b;',
			'color: #8b5cf6; font-weight: bold;',
			'color: #64748b;'
		);

		// === Confetti ===
		const confetti = (x, y) => {
			if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;

			const canvas = document.createElement('canvas');
			const dpr = devicePixelRatio || 1;
			canvas.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999';
			canvas.width = innerWidth * dpr;
			canvas.height = innerHeight * dpr;
			document.body.appendChild(canvas);

			const ctx = canvas.getContext('2d');
			ctx.scale(dpr, dpr);

			const colors = ['#f43f5e', '#8b5cf6', '#3b82f6', '#22c55e', '#eab308', '#f97316', '#ec4899'];
			const particles = Array.from({ length: 100 }, () => {
				const angle = Math.random() * Math.PI * 2;
				const speed = 3 + Math.random() * 7;
				return {
					x, y,
					vx: Math.cos(angle) * speed * (0.5 + Math.random()),
					vy: Math.sin(angle) * speed - 6,
					w: 3 + Math.random() * 5,
					h: 2 + Math.random() * 3,
					color: colors[Math.floor(Math.random() * colors.length)],
					rot: Math.random() * Math.PI * 2,
					rotV: (Math.random() - 0.5) * 0.2,
				};
			});

			let frame = 0;
			const animate = () => {
				if (++frame > 180) { canvas.remove(); return; }
				ctx.clearRect(0, 0, innerWidth, innerHeight);

				for (const p of particles) {
					p.vy += 0.12;
					p.vx *= 0.99;
					p.x += p.vx;
					p.y += p.vy;
					p.rot += p.rotV;

					ctx.save();
					ctx.translate(p.x, p.y);
					ctx.rotate(p.rot);
					ctx.globalAlpha = Math.max(0, 1 - (frame / 180) ** 2);
					ctx.fillStyle = p.color;
					ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
					ctx.restore();
				}

				requestAnimationFrame(animate);
			};
			requestAnimationFrame(animate);
		};

		// === Theme ===
		const applyTheme = (theme) => {
			const dark = theme === 'dark' || (theme === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
			document.documentElement.classList.toggle('dark', dark);
		};

		matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
			if ((localStorage.getItem('theme') || 'system') === 'system') {
				applyTheme('system');
				updateTodTint();
			}
		});

		// === Party mode (also exposed via window.duffle.party) ===
		let partyActive = false;
		const togglePartyMode = () => {
			partyActive = !partyActive;
			document.body.classList.toggle('party-mode', partyActive);
			const h1 = document.querySelector('h1');
			if (h1) h1.classList.toggle('party-text', partyActive);
			if (partyActive) {
				for (let i = 0; i < 5; i++) {
					setTimeout(() => confetti(Math.random() * innerWidth, Math.random() * innerHeight * 0.6), i * 150);
				}
			}
			return partyActive;
		};

		// === Time-of-day ambient tint (system theme only) ===
		const updateTodTint = () => {
			const tintEl = document.getElementById('tod-tint');
			if (!tintEl) return;
			const theme = localStorage.getItem('theme') || 'system';
			if (theme !== 'system') {
				tintEl.classList.remove('active');
				return;
			}
			const hour = new Date().getHours();
			const isDark = document.documentElement.classList.contains('dark');
			let tint;
			if (hour >= 5 && hour < 9) {
				tint = isDark ? 'rgba(254, 215, 170, 0.06)' : 'rgba(254, 215, 170, 0.45)';
			} else if (hour >= 9 && hour < 16) {
				tint = isDark ? 'rgba(186, 230, 253, 0.05)' : 'rgba(219, 234, 254, 0.5)';
			} else if (hour >= 16 && hour < 19) {
				tint = isDark ? 'rgba(216, 180, 254, 0.06)' : 'rgba(233, 213, 255, 0.5)';
			} else {
				tint = isDark ? 'rgba(165, 180, 252, 0.07)' : 'rgba(199, 210, 254, 0.45)';
			}
			document.documentElement.style.setProperty('--accent-tint', tint);
			tintEl.classList.add('active');
		};

		const updateToggle = (theme) => {
			document.querySelectorAll('[data-theme]').forEach(btn => {
				const active = btn.dataset.theme === theme;
				btn.setAttribute('aria-checked', active);
				btn.classList.toggle('bg-stone-100', active);
				btn.classList.toggle('dark:bg-slate-800', active);
				btn.classList.toggle('text-stone-700', active);
				btn.classList.toggle('dark:text-slate-200', active);
				btn.classList.toggle('text-stone-400', !active);
				btn.classList.toggle('hover:text-stone-600', !active);
				btn.classList.toggle('dark:text-slate-500', !active);
				btn.classList.toggle('dark:hover:text-slate-300', !active);
			});
		};

		// === Quotes ===
		const quotes = [
			"At museums, she's allowed to touch the art.",
			"Both sides of her pillow are cool.",
			"Even her enemies list her as their emergency contact.",
			"Her eye contact alone counts as a first date.",
			"Her only regret is not knowing what regret feels like.",
			"Her personality is so magnetic, she is unable to carry credit cards.",
			"Her two cents is worth £37.50.",
			"If life were to give her lemons, she'd make a spinach fettuccine with a shiitake mushroom glaze.",
			"If opportunity knocks and she is not home, opportunity waits.",
			"If there is an elephant in the room, it's because she brought one.",
			"In a past life, she was herself.",
			"In school, bullies gave her their lunch money.",
			"Mosquitoes refuse to bite her, purely out of respect.",
			"She can slam a revolving door.",
			"She can tie her arm behind her back, with one arm tied behind her back.",
			"She could disarm you with her charm, or her hands... either way.",
			"She has a bear rug in her house... it's not dead or anything, it's just too scared to move.",
			"She has inside jokes with complete strangers.",
			"She has never relied on mistletoe.",
			"She is a morning, evening, and night person.",
			"She is the life of parties she has never attended.",
			"She lives vicariously through herself.",
			"She once 3D printed a 3D printer.",
			"She once cheated death, and death was perfectly okay with it.",
			"She once gave a pep talk so compelling, both teams won.",
			"She once had a staring contest with the sun. The sun blinked first.",
			"She once had an awkward moment, just to see how it feels.",
			"She once visited the Virgin Islands. Now they just call them the Islands.",
			"She once went to Burger King and ordered a Big Mac, and got one.",
			"She once won a bet against Superman. Now Superman has to wear his underwear on the outside.",
			"She's a lover, not a fighter. But she is also a fighter, so don't get any ideas.",
			"The last time she flirted with danger, danger got clingy.",
			"The police often question her, just because they find her interesting.",
			"They once named a street after her, but they had to change the name because no one crosses her and lives.",
			"When in Rome, they do as she does.",
			"When she has a 50/50 shot, the odds are 80/20 in her favour.",
			"When she was born, she drove her mother home from the hospital.",
			"When the cops pull her over, she lets the cops off with a warning.",
		];

		const sequencer = () => {
			const shuffle = (arr) => {
				const copy = arr.slice();
				for (let i = copy.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[copy[i], copy[j]] = [copy[j], copy[i]];
				}
				return copy;
			};

			let order = shuffle(quotes.map((_, i) => i));
			let pointer = 0;
			let lastIdx = -1;

			return () => {
				if (pointer >= order.length) {
					order = shuffle(quotes.map((_, i) => i));
					if (lastIdx !== -1 && order[0] === lastIdx && order.length > 1) {
						const swap = Math.floor(Math.random() * (order.length - 1)) + 1;
						[order[0], order[swap]] = [order[swap], order[0]];
					}
					pointer = 0;
				}
				const idx = order[pointer++];
				lastIdx = idx;
				return { text: quotes[idx], idx };
			}
		}

		// === Init ===
		const onReady = (fn) => {
			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", fn, { once: true });
			} else {
				fn();
			}
		};

		// === Quotes init + share permalink ===
		let setQuoteFn = null;
		let currentQuoteIdx = -1;
		const quoteEl = document.getElementById("quote");
		const textEl = document.getElementById("quote-text");
		const shareBtn = document.getElementById("quote-share");

		onReady(() => {
			if (quoteEl && textEl) {
				const seq = sequencer();
				let timer;
				const renderQuote = (text) => {
					textEl.textContent = text;
					textEl.classList.remove("quote-fade-in");
					void textEl.offsetWidth;
					textEl.classList.add("quote-fade-in");
				};
				const advance = () => {
					const next = seq();
					currentQuoteIdx = next.idx;
					renderQuote(next.text);
				};
				const resetTimer = () => {
					clearInterval(timer);
					timer = setInterval(advance, 5000);
				};
				setQuoteFn = () => { advance(); resetTimer(); };

				// Honor ?q=N permalink: show that quote, pause auto-rotation
				const params = new URLSearchParams(location.search);
				const qParam = params.get('q');
				const qIdx = qParam !== null ? parseInt(qParam, 10) : NaN;
				if (Number.isInteger(qIdx) && qIdx >= 0 && qIdx < quotes.length) {
					currentQuoteIdx = qIdx;
					renderQuote(quotes[qIdx]);
					// no resetTimer — let the recipient see the linked quote
				} else {
					advance();
					resetTimer();
				}

				// Click block to advance (and resume rotation)
				quoteEl.addEventListener('click', (e) => {
					if (e.target.closest('#quote-share')) return;
					advance();
					resetTimer();
				});

				// Share button: copy permalink to current quote
				if (shareBtn) {
					shareBtn.addEventListener('click', async (e) => {
						e.stopPropagation();
						if (currentQuoteIdx < 0) return;
						const url = `${location.origin}/?q=${currentQuoteIdx}`;
						try {
							await navigator.clipboard.writeText(url);
							shareBtn.classList.add('copied');
							setTimeout(() => shareBtn.classList.remove('copied'), 1500);
						} catch {
							// Fallback: select-and-prompt
							prompt('Copy this link:', url);
						}
					});
				}
			}

			// Theme toggle
			const currentTheme = localStorage.getItem('theme') || 'system';
			updateToggle(currentTheme);
			updateTodTint();

			document.querySelectorAll('[data-theme]').forEach(btn => {
				btn.addEventListener('click', () => {
					const theme = btn.dataset.theme;
					localStorage.setItem('theme', theme);
					applyTheme(theme);
					updateToggle(theme);
					updateTodTint();
				});
			});

			// Confetti easter egg + click counter
			const portrait = document.getElementById('portrait');
			if (portrait) {
				let clicks = 0;
				const reactions = [
					null, null, null,           // 1-3: just confetti
					'🎉',                       // 4
					null, null, null, null, null,
					'👀 10 clicks? Really?',     // 10
					null, null, null, null, null, null, null, null, null,
					'🤯 20?! I am concerned.',   // 20
					null, null, null, null,
					'🏆 25 — You win. At what? Nobody knows.', // 25
				];

				const showReaction = (text) => {
					const toast = document.createElement('div');
					toast.textContent = text;
					toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f8fafc;padding:8px 20px;border-radius:9999px;font-size:14px;z-index:10000;opacity:0;transition:opacity 300ms;pointer-events:none;white-space:nowrap;';
					document.body.appendChild(toast);
					requestAnimationFrame(() => toast.style.opacity = '1');
					setTimeout(() => {
						toast.style.opacity = '0';
						setTimeout(() => toast.remove(), 300);
					}, 2000);
				};

				const trigger = () => {
					clicks++;
					const rect = portrait.getBoundingClientRect();
					confetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
					if (clicks < reactions.length && reactions[clicks - 1]) {
						showReaction(reactions[clicks - 1]);
					} else if (clicks >= 50 && clicks % 50 === 0) {
						showReaction(`${clicks} clicks. This is your life now.`);
					}
				};
				portrait.addEventListener('click', trigger);
				portrait.addEventListener('keydown', (e) => {
					if (e.key === 'Enter' || e.key === ' ') {
						e.preventDefault();
						trigger();
					}
				});
			}

			// === Konami Code ===
			const konamiSeq = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
			let konamiIdx = 0;
			document.addEventListener('keydown', (e) => {
				if (e.key === konamiSeq[konamiIdx]) {
					konamiIdx++;
					if (konamiIdx === konamiSeq.length) {
						konamiIdx = 0;
						togglePartyMode();
					}
				} else {
					konamiIdx = e.key === konamiSeq[0] ? 1 : 0;
				}
			});

			// Refresh time-of-day tint each minute (so hour rollovers update the tint)
			setInterval(updateTodTint, 60000);

			// === Players Online: button glow, animated favicon, transition toast ===
			const KEY_LAST_SERVERS = 'duffle:lastServers';
			const faviconLink = document.querySelector('link[rel="icon"]');
			let faviconPulseTimer = null;

			const buildFaviconVariants = () => new Promise((resolve) => {
				const img = new Image();
				img.crossOrigin = 'anonymous';
				img.onload = () => {
					const size = 64;
					const draw = () => {
						const c = document.createElement('canvas');
						c.width = size; c.height = size;
						const ctx = c.getContext('2d');
						ctx.drawImage(img, 0, 0, size, size);
						return { canvas: c, ctx };
					};
					try {
						const base = draw().canvas.toDataURL('image/png');
						const dot = draw();
						dot.ctx.beginPath();
						dot.ctx.arc(size - 14, size - 14, 13, 0, Math.PI * 2);
						dot.ctx.fillStyle = '#22c55e';
						dot.ctx.fill();
						dot.ctx.lineWidth = 3;
						dot.ctx.strokeStyle = '#ffffff';
						dot.ctx.stroke();
						resolve({ base, dot: dot.canvas.toDataURL('image/png') });
					} catch {
						resolve(null);
					}
				};
				img.onerror = () => resolve(null);
				img.src = faviconLink ? faviconLink.href : '/favicon.png';
			});

			const startFaviconPulse = async () => {
				if (faviconPulseTimer || !faviconLink) return;
				const variants = await buildFaviconVariants();
				if (!variants) return;
				let on = false;
				faviconLink.href = variants.dot;
				faviconPulseTimer = setInterval(() => {
					on = !on;
					faviconLink.href = on ? variants.base : variants.dot;
				}, 1100);
			};

			const showServerToast = (server, delay = 0) => {
				setTimeout(() => {
					const toast = document.createElement('a');
					toast.className = 'server-toast';
					toast.href = '/gaming';
					toast.innerHTML = `<span class="dot" aria-hidden="true"></span><span>🎮 ${server.players} on <strong>${server.name}</strong></span>`;
					document.body.appendChild(toast);
					// Double rAF so the initial transform paints before .show triggers the transition
					requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
					setTimeout(() => {
						toast.classList.add('hide');
						setTimeout(() => toast.remove(), 500);
					}, 6000);
				}, delay);
			};

			fetch('https://gaming.dfl-be7.workers.dev')
				.then(r => r.ok ? r.json() : [])
				.then(servers => {
					const total = servers.reduce((n, s) => n + (s.running && s.players ? s.players : 0), 0);
					const link = document.getElementById('gaming-link');
					if (link && total > 0) link.classList.add('players-online-glow');
					if (total > 0) startFaviconPulse();

					// Toast for servers that newly came online (vs last visit)
					const prevRaw = localStorage.getItem(KEY_LAST_SERVERS);
					const isFirstVisit = prevRaw === null;
					const prev = isFirstVisit ? {} : (() => { try { return JSON.parse(prevRaw); } catch { return {}; } })();
					const now = {};
					const transitions = [];
					for (const s of servers) {
						const players = s.running && s.players ? s.players : 0;
						now[s.name] = players;
						if (!isFirstVisit && players > 0 && (prev[s.name] || 0) === 0) {
							transitions.push({ name: s.name, players });
						}
					}
					localStorage.setItem(KEY_LAST_SERVERS, JSON.stringify(now));
					transitions.forEach((s, i) => showServerToast(s, 800 + i * 4500));
				})
				.catch(() => { });

			// === Tab Title Trolling ===
			const realTitle = document.title;
			const awayMessages = [
				'👋 Come baaack!',
				'😢 Miss you already…',
				'🥺 Was it something I said?',
				'💔 Don\'t leave me hanging!',
			];
			let awayIdx = 0;
			let awayTimer;
			document.addEventListener('visibilitychange', () => {
				if (document.hidden) {
					awayIdx = 0;
					document.title = awayMessages[0];
					awayTimer = setInterval(() => {
						awayIdx = (awayIdx + 1) % awayMessages.length;
						document.title = awayMessages[awayIdx];
					}, 2000);
				} else {
					clearInterval(awayTimer);
					document.title = '🎉 Welcome back!';
					setTimeout(() => { document.title = realTitle; }, 1500);
				}
			});

			// === window.duffle API (toys for the console) ===
			window.duffle = {
				confetti: (x, y) => {
					confetti(x ?? innerWidth / 2, y ?? innerHeight / 2);
					return '🎉';
				},
				party: () => togglePartyMode() ? 'party on' : 'party off',
				quote: () => {
					if (setQuoteFn) setQuoteFn();
					return textEl ? textEl.textContent : null;
				},
				help: () => {
					console.log(
						'%cwindow.duffle\n' +
						'%c  .confetti(x?, y?)  fire confetti at (x, y) or center\n' +
						'  .party()           toggle party mode\n' +
						'  .quote()           show next quote (returns text)\n' +
						'  .help()            this message',
						'color:#8b5cf6;font-weight:bold;font-size:13px',
						'color:inherit;font-size:12px'
					);
					return undefined;
				},
			};
		});
	</script>
</body>
